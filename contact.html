<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Zoya Arief">
  <meta name="description" content="Contact Zoya Arief">
  <link rel="icon" href="images/favicon.ico" type="image/x-icon">
  <title>Contact - Zoya Arief</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="header">
  <nav class="navigation">
    <div class="nav-brand">Zoya Arief</div>
    <ul class="nav-menu">
      <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
      <li class="nav-item"><a href="projects.html" class="nav-link">Projects</a></li>
      <li class="nav-item"><a href="contact.html" class="nav-link active">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="main-content">
  <section class="contact-section">
    <div class="container">
      <h1 class="page-title">Contact Me</h1>

      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label for="name" class="form-label">Name:</label>
          <input type="text" id="name" name="name" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email:</label>
          <input type="email" id="email" name="email" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="message" class="form-label">Message:</label>
          <textarea id="message" name="message" rows="5" class="form-textarea" required></textarea>
        </div>

        <button type="submit" class="form-button">Send Message</button>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <p class="footer-text">&copy; 2024 Zoya Arief. All rights reserved.</p>
  </div>
</footer>

<script type="module" src="js/contact.js"></script>
</body>
</html>
